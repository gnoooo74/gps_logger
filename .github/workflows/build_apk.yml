name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 설치 (Gradle에 필요)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter SDK 설치 (항상 최신 stable 채널 사용)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: Android 플랫폼 폴더 생성 (없을 경우에만)
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.example .
          fi

      - name: AndroidManifest에 위치/알림 권한 추가
        run: python3 scripts/patch_manifest.py

      - name: Release APK 빌드
        run: flutter build apk --release

      - name: APK 업로드 (Actions 아티팩트로 다운로드 가능)
        uses: actions/upload-artifact@v4
        with:
          name: location-tracker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
