name: location_tracker
description: 위치정보 자동 수집 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 위치 수집
  geolocator: ^11.0.0
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  permission_handler: ^11.3.0

  # 로컬 저장
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # 네트워크 (카카오 API 호출용)
  http: ^1.2.0

  # 지도 웹뷰
  webview_flutter: ^4.7.0

  # 날짜 포맷 / 그룹핑
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
